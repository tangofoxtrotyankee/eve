packages:
  - apps/*
  - apps/*/*
  - e2e/fixtures/*
  - packages/*

allowBuilds:
  "@mongodb-js/zstd": true
  "@nestjs/core": true
  "@parcel/watcher": false
  cbor-extract: true
  esbuild: true
  node-liblzma: false
  protobufjs: true
  sharp: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: false

catalog:
  "@ai-sdk/anthropic": "4.0.0-beta.67"
  "@ai-sdk/google": "4.0.0-beta.82"
  "@ai-sdk/mcp": "2.0.0-beta.66"
  "@ai-sdk/openai": "4.0.0-beta.74"
  "@ai-sdk/otel": "1.0.0-beta.124"
  "@ai-sdk/provider": "4.0.0-beta.19"
  "@ai-sdk/provider-utils": "5.0.0-beta.49"
  "@ai-sdk/react": "4.0.0-beta.182"
  "@types/node": "25.9.1"
  "@types/react": "19.2.15"
  "@types/react-dom": "19.2.3"
  "@typescript/native-preview": "7.0.0-dev.20260523.1"
  "@vercel/connect": "0.2.2"
  "@vercel/sandbox": "2.2.1"
  ai: "7.0.0-beta.178"
  next: "16.2.6"
  picocolors: "1.1.1"
  react: "19.2.6"
  react-dom: "19.2.6"
  streamdown: "2.5.0"
  typescript: "6.0.3"
  vitest: "4.1.7"
  zod: "4.4.3"

minimumReleaseAge: 2880 # 2 days

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@turbo/*"
  - "@workflow/*"
  - "@vercel/*"
  - ai
  - crossws
  - experimental-ai-sdk-code-mode
  - eve
  - nitro
  - turbo
  - vercel
  # Temporary third-party transitives required by latest Nitro before they age through
  # the workspace release-age policy.
  - env-runner
  - ocache
